<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 연수원 이용 안내</title>
    <meta name="theme-color" content="#EA1917">
    
    <script>
        function goBack() {
            try {
                if (window.history.length > 1) {
                    window.history.back();
                    return;
                }
            } catch (e) {
                console.log('history.back() 실패:', e);
            }

            try {
                const currentUrl = window.location.href;
                const parentUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
                if (parentUrl && parentUrl !== currentUrl) {
                    window.location.href = parentUrl;
                    return;
                }
            } catch (e) {
                console.log('상위 폴더 이동 실패:', e);
            }

            try {
                window.location.href = '../index.html';
            } catch (e) {
                console.log('index.html 이동 실패:', e);
                window.open('../index.html', '_blank');
            }
        }
    </script>

    <style>
        :root {
            --sk-red: #EA1917;
            --sk-orange: #FF6B35;
            --success: #4CAF50;
            --warning: #FF9800;
            --info: #2196F3;
            --purple: #9C27B0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
            color: #333;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--success) 0%, var(--info) 100%);
            color: white;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 0;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 9999;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .loading-indicator {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid var(--success);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .data-source-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .source-google {
            background: rgba(76, 175, 80, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .source-cache {
            background: rgba(255, 152, 0, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .source-default {
            background: rgba(156, 39, 176, 0.1);
            color: var(--purple);
            border: 1px solid var(--purple);
        }

        .center-info-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
            text-align: center;
            border-left: 4px solid var(--success);
        }

        .center-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .center-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 8px;
        }

        .center-address {
            font-size: 14px;
            color: #666;
            user-select: text;
        }

        .info-section {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
            border-left: 4px solid var(--success);
        }

        .info-section.my-team {
            border-left-color: var(--sk-red);
        }

        .info-section.facilities {
            border-left-color: var(--info);
        }

        .info-section.amenities {
            border-left-color: var(--warning);
        }

        .info-section.contact {
            border-left-color: var(--purple);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-section.my-team .section-title {
            color: var(--sk-red);
        }

        .info-section.facilities .section-title {
            color: var(--info);
        }

        .info-section.amenities .section-title {
            color: var(--warning);
        }

        .info-section.contact .section-title {
            color: var(--purple);
        }

        .team-badge {
            display: inline-block;
            background: var(--sk-red);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .map-container {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ddd;
        }

        /* 이미지가 있을 때 스타일 변경 */
        .map-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 12px;
        }

        /* 이미지가 있을 때는 점선 테두리 제거 */
        .map-container:has(img) {
            border: 1px solid rgba(255,255,255,0.2);
        }

        .map-placeholder {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 12px;
        }

        .map-highlight {
            background: rgba(234, 25, 23, 0.1);
            border: 1px solid var(--sk-red);
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 600;
            color: #c62828;
            font-size: 14px;
        }


        .facility-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .facility-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .facility-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.9);
        }

        .facility-icon {
            font-size: 24px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .facility-content {
            flex: 1;
        }

        .facility-name {
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
            user-select: text;
        }

        .facility-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            user-select: text;
        }

        .facility-hours {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: #2e7d32;
            font-weight: 500;
        }

        .facility-note {
            background: rgba(255, 152, 0, 0.1);
            border: 1px solid var(--warning);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 13px;
            color: #e65100;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.2);
            background: rgba(255, 255, 255, 0.9);
        }

        .contact-icon {
            font-size: 24px;
            color: var(--purple);
            flex-shrink: 0;
        }

        .contact-details {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .contact-phone {
            font-size: 14px;
            color: var(--purple);
            font-weight: 500;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideInRight 0.3s ease;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.warning {
            background: var(--warning);
        }

        .toast.error {
            background: #f44336;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .info-section {
                padding: 20px;
                margin-bottom: 16px;
            }

            .title {
                font-size: 20px;
            }

            .map-container img {
                border-radius: 4px;
            }

            .facility-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .contact-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .facility-item {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
            <div class="title">🏢 연수원 이용 안내</div>
            <div class="subtitle">시설 위치 및 이용 방법 가이드</div>
        </div>
    </div>

    <div class="container">
        <!-- 로딩 인디케이터 -->
        <div class="loading-indicator" id="loading">
            <div class="loading-spinner"></div>
            <div>연수원 정보를 불러오는 중...</div>
        </div>

        <!-- 현재 선택된 연수원 정보 + 내 분과 정보 -->
        <div class="center-info-card" id="center-info" style="display: none;">
            <!-- 연수원 정보가 동적으로 로드됩니다 -->
        </div>

        <!-- 전체 맵 -->
        <div class="info-section facilities" id="map-section" style="display: none;">
            <div class="section-title">
                <span>🗺️</span>
                연수원 전체 맵
            </div>
            
            <div class="map-container">
                <div class="map-placeholder">
                    📍 연수원 건물 배치도
                    <div style="font-size: 0.9em; margin-top: 8px; opacity: 0.7;">
                        (실제 구현 시 인터랙티브 맵 또는 이미지)
                    </div>
                </div>
                <div class="map-highlight" id="map-highlight">
                    내 위치를 확인 중...
                </div>
            </div>
        </div>

        <!-- 편의시설 이용안내 -->
        <div class="info-section amenities" id="amenities-section" style="display: none;">
            <div class="section-title">
                <span>🎯</span>
                편의시설 안내
            </div>
            
            <div class="facility-grid" id="amenities-grid">
                <!-- 편의시설 정보가 동적으로 로드됩니다 -->
            </div>
        </div>

        <!-- 연락처 정보 -->
        <div class="info-section contact" id="contact-section" style="display: none;">
            <div class="section-title">
                <span>📞</span>
                연수원 연락처
            </div>
            
            <div class="contact-grid" id="contact-list">
                <!-- 연락처가 동적으로 로드됩니다 -->
            </div>
        </div>
    </div>

    <script>
        // =====================================================
        // 구글 시트 연동 관리 클래스
        // =====================================================
        class FacilityDataManager {
            constructor() {
                this.APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyvkEufshC8wwQwMqO5nJsdhhUC6EvBqKkeXVR5YF5cQnnPLUG3oo5d0eObTVkjN55Y/exec';
            }

            // Setup에서 연수원 및 분과 정보 가져오기
            getSetupInfo() {
                try {
                    // sk-mentor-info 우선 확인
                    const mentorInfo = localStorage.getItem('sk-mentor-info');
                    if (mentorInfo && mentorInfo !== 'null') {
                        const parsed = JSON.parse(mentorInfo);
                        if (parsed.trainingCenter && parsed.teamNumber) {
                            console.log('✅ sk-mentor-info에서 발견:', parsed.trainingCenter, parsed.teamNumber);
                            return {
                                trainingCenter: parsed.trainingCenter.toLowerCase(),
                                teamNumber: parseInt(parsed.teamNumber)
                            };
                        }
                    }
                    
                    // 방법 1: 직접 저장된 값 확인
                    const selectedCenter = localStorage.getItem('selectedCenter');
                    console.log('📋 selectedCenter 값:', selectedCenter);
                    
                    let trainingCenter = null;
                    let teamNumber = null; // 기본값을 null로 변경
                    
                    if (selectedCenter && selectedCenter !== 'null' && selectedCenter !== '') {
                        trainingCenter = selectedCenter;
                        console.log('✅ selectedCenter에서 연수원 정보 발견:', selectedCenter);
                    } else {
                        // 방법 2: 기존 setupData 확인
                        const setupData = localStorage.getItem('mentorSetup');
                        console.log('📋 mentorSetup 원본 데이터:', setupData);
                        
                        if (setupData && setupData !== 'null') {
                            const setup = JSON.parse(setupData);
                            console.log('📊 파싱된 setup 객체:', setup);
                            
                            if (setup.trainingCenter) {
                                trainingCenter = setup.trainingCenter;
                                console.log('✅ mentorSetup에서 연수원 정보 발견:', setup.trainingCenter);
                            }
                            
                            if (setup.teamNumber) {
                                teamNumber = setup.teamNumber;
                                console.log('✅ mentorSetup에서 분과 정보 발견:', setup.teamNumber);
                            }
                        }
                    }
                    
                    if (!trainingCenter) {
                        console.log('⚠️ Setup에서 연수원 정보를 찾을 수 없음. 기본값(icheon) 사용');
                        trainingCenter = 'icheon';
                    }
                    
                    return { trainingCenter, teamNumber };
                    
                } catch (e) {
                    console.error('❌ Setup 데이터 읽기 실패:', e);
                    return { trainingCenter: 'icheon', teamNumber: null };
                }
            }

            // 구글 시트에서 연수원 데이터 가져오기
            async fetchFromGoogleSheets() {
                try {
                    console.log('🔄 구글 시트 연결 시도...');
                    console.log('📡 요청 URL:', this.APPS_SCRIPT_URL + '?action=getTrainingCenters');
                    
                    const response = await fetch(this.APPS_SCRIPT_URL + '?action=getTrainingCenters', {
                        method: 'GET',
                        mode: 'cors',
                        headers: {
                            'Accept': 'application/json',
                        }
                    });
                    
                    console.log('📊 응답 상태:', response.status, response.statusText);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const responseText = await response.text();
                    console.log('📄 원본 응답 텍스트:', responseText);
                    
                    const data = JSON.parse(responseText);
                    console.log('✅ 파싱된 JSON 데이터:', data);
                    
                    if (data.error) {
                        throw new Error(`앱스 스크립트 오류: ${data.error}`);
                    }
                    
                    return this.parseSheetData(data);
                    
                } catch (error) {
                    console.error('❌ 구글 시트 연결 실패:', error);
                    return null;
                }
            }

            // 시트 데이터 파싱
            parseSheetData(data) {
                console.log('🔄 시트 데이터 파싱 시작...');
                const centers = {};
                
                if (!Array.isArray(data)) {
                    console.error('❌ 데이터가 배열이 아님:', typeof data, data);
                    return null;
                }
                
                console.log(`📊 총 ${data.length}개 행 처리 예정`);
                
                data.forEach((row, index) => {
                    try {
                        console.log(`🔍 행 ${index + 1} 처리 중:`, row);
                        
                        const {
                            er_id,
                            center_name,
                            address,
                            emergency_phone,
                            wifi_ssid,
                            wifi_password,
                            operations_name,
                            operations_phone,
                            mentor_support_name,
                            mentor_support_phone,
                            enabled
                        } = row;
                        
                        console.log(`  📋 er_id: ${er_id}, enabled: ${enabled}`);
                        
                        if (!er_id || enabled !== true) {
                            console.log(`  ⏭️ 행 ${index + 1} 스킵됨 (er_id: ${er_id}, enabled: ${enabled})`);
                            return;
                        }
                        
                        centers[er_id] = {
                            name: center_name || this.getDefaultCenterName(er_id),
                            address: address || '주소 정보 없음',
                            wifi: {
                                ssid: wifi_ssid || 'Wi-Fi 정보 없음',
                                password: wifi_password || 'N/A'
                            },
                            contacts: [
                                {
                                    icon: "👨‍💼",
                                    name: operations_name ? `운영진 대표 (${operations_name})` : "운영진 대표",
                                    phone: operations_phone || 'N/A'
                                },
                                {
                                    icon: "📋",
                                    name: mentor_support_name ? `교육 운영 (${mentor_support_name})` : "교육 운영",
                                    phone: mentor_support_phone || 'N/A'
                                },
                                {
                                    icon: "🚨",
                                    name: "연수원 문의",
                                    phone: emergency_phone || 'N/A'
                                }
                            ]
                        };
                        
                        console.log(`  ✅ ${er_id} 연수원 데이터 파싱 완료`);
                        
                    } catch (parseError) {
                        console.error(`❌ 행 ${index + 1} 파싱 실패:`, parseError, row);
                    }
                });
                
                console.log('🎯 최종 파싱된 연수원 데이터:', centers);
                return centers;
            }

            async fetchFacilityMapping() {
                try {
                    const response = await fetch('https://script.google.com/macros/s/AKfycbyvkEufshC8wwQwMqO5nJsdhhUC6EvBqKkeXVR5YF5cQnnPLUG3oo5d0eObTVkjN55Y/exec?action=getfacilityMapping');
                    const json = await response.json();
                    
                    // 배열을 객체로 변환
                    const mapping = {};
                    json.forEach(item => {
                        if (!mapping[item.center_id]) {
                            mapping[item.center_id] = {};
                        }
                        mapping[item.center_id][item.team_number] = {
                            lectureHall: item.lecture_hall,
                            teamRoom: item.team_room
                        };
                    });
                    
                    console.log('📊 변환된 분과 매핑:', mapping);
                    return mapping;
                    
                } catch (error) {
                    console.warn('❌ facilityMapping 로드 실패:', error);
                    return null;
                }
            }


            // 기본 연수원 이름 가져오기
            getDefaultCenterName(centerId) {
                const names = {
                    'icheon': '이천 SKT인재개발원',
                    'yongin': '용인 SK아카데미',
                    'incheon': '인천 SK무의연수원',
                    'sunning': '써닝 리더십센터',
                    'sbti': '중소벤처기업연수원'
                };
                return names[centerId] || `${centerId} 연수원`;
            }

            // 캐시에서 데이터 가져오기
            getFromCache() {
                try {
                    const cachedData = localStorage.getItem('facility-centers-backup');
                    const cacheTime = localStorage.getItem('facility-centers-backup-time');
                    
                    if (!cachedData) {
                        throw new Error('캐시 데이터 없음');
                    }
                    
                    // 캐시 만료 확인 (5분)
                    if (cacheTime && Date.now() - parseInt(cacheTime) > 5 * 60 * 1000) {
                        console.warn('⏰ 캐시 데이터 만료됨');
                        // 만료되어도 반환 (오프라인에서는 오래된 데이터라도 유용)
                    }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        document.body.removeChild(toast);
                    }
                }, 300);
            }, 3000);
        }

                teamRoom: '연수원 연결이 원활하지 않습니다'
                };

                // ✅ UI 업데이트는 항상 실행
                updateUI(centerData, staticData, teamInfo, selectedCenter, teamNumber, source);

                const messages = {
                'google': '✅ 최신 데이터로 업데이트되었습니다',
                'cache': '💾 캐시된 데이터를 사용합니다',
                'default': '📄 기본 데이터를 사용합니다'
                };
                showToast(messages[source], source === 'google' ? 'success' : source === 'cache' ? 'warning' : 'info');

                console.log('✅ 연수원 시설 정보 로드 완료:', selectedCenter, centerData.name);
            } catch (error) {
                console.error('❌ 연수원 정보 로드 실패:', error);
                showToast('❌ 데이터 로드에 실패했습니다', 'error');
                hideLoadingAndShowContent();
            }
        }


        function updateUI(centerData, staticData, teamInfo, selectedCenter, teamNumber, source) {
            // 로딩 숨기고 컨텐츠 표시
            hideLoadingAndShowContent();
            
            // Wi-Fi 정보 동적 교체
            const amenitiesWithWifi = staticData.amenities.map(amenity => {
                if (amenity.icon === "📶") {
                    return {
                        ...amenity,
                        note: `ID: ${centerData.wifi.ssid} / PW: ${centerData.wifi.password}`
                    };
                }
                return amenity;
            });
            
            // 연수원 정보 카드 업데이트 (분과 정보 포함)
            const centerInfo = document.getElementById('center-info');
            centerInfo.innerHTML = `
                ${getDataSourceBadge(source)}
                <div class="center-icon">${staticData.icon}</div>
                <div class="center-name">${centerData.name}</div>
                <div class="center-address">${centerData.address}</div>
                <div style="margin-top: 16px; padding: 12px; background: rgba(234, 25, 23, 0.1); border-radius: 8px; border: 1px solid #ea1917;">
                    <div style="font-weight: 600; color: #ea1917; margin-bottom: 8px;">📍 현재 설정: ${centerData.name} ${teamNumber}분과</div>
                    <div style="font-size: 14px; color: #666;">
                        <strong>중강의장:</strong> ${teamInfo.lectureHall} | 
                        <strong>분과장:</strong> ${teamInfo.teamRoom}
                    </div>
                </div>
            `;
            
            // 편의시설 업데이트 (Wi-Fi 정보 포함)
            const amenitiesGrid = document.getElementById('amenities-grid');
            amenitiesGrid.innerHTML = amenitiesWithWifi.map(amenity => `
                <div class="facility-item">
                    <div class="facility-icon">${amenity.icon}</div>
                    <div class="facility-content">
                        <div class="facility-name">${amenity.name}</div>
                        <div class="facility-info">${amenity.info}</div>
                        <div class="facility-hours">${amenity.hours}</div>
                        ${amenity.note ? `<div class="facility-note">💡 ${amenity.note}</div>` : ''}
                    </div>
                </div>
            `).join('');
            
            // 연락처 업데이트 (구글시트에서 온 동적 데이터)
            const contactList = document.getElementById('contact-list');
            contactList.innerHTML = centerData.contacts.map(contact => `
                <div class="contact-item">
                    <div class="contact-icon">${contact.icon}</div>
                    <div class="contact-details">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-phone">${contact.phone}</div>
                    </div>
                </div>
            `).join('');
            
            // 맵 컨테이너 업데이트 (이미지 포함)
            const mapContainer = document.querySelector('.map-container');
            if (selectedCenter === 'icheon' || selectedCenter === 'yongin' || selectedCenter === 'incheon'|| selectedCenter === 'sunning' || selectedCenter === 'gapyeong'|| selectedCenter === 'cheonggang') {
                mapContainer.innerHTML = `
                    <img src="../assets/images/map-${selectedCenter}.png" 
                        alt="${centerData.name} 건물 배치도">
                    <div class="map-highlight">내 주요 활동 위치: ${teamInfo.teamRoom}</div>
                `;
            } else {
                mapContainer.innerHTML = `
                    <div class="map-placeholder">
                        📍 연수원 건물 배치도
                        <div style="font-size: 0.9em; margin-top: 8px; opacity: 0.7;">
                            (준비 중)
                        </div>
                    </div>
                    <div class="map-highlight">내 주요 활동 위치: ${teamInfo.teamRoom}</div>
                `;
            }
        }

        function hideLoadingAndShowContent() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('center-info').style.display = 'block';
            document.getElementById('map-section').style.display = 'block';
            document.getElementById('amenities-section').style.display = 'block';
            document.getElementById('contact-section').style.display = 'block';
        }

        // =====================================================
        // 페이지 로드 시 실행
        // =====================================================
        document.addEventListener('DOMContentLoaded', async function() {
            // 연수원 정보 로드
            await loadFacilityInfo();
            
            // 애니메이션
            const sections = document.querySelectorAll('.info-section, .center-info-card');
            sections.forEach((section, index) => {
                section.style.opacity = '0';
                section.style.transform = 'translateY(30px)';
                
                setTimeout(() => {
                    section.style.transition = 'all 0.6s ease';
                    section.style.opacity = '1';
                    section.style.transform = 'translateY(0)';
                }, index * 150);
            });
        });
    </script>
</body>
</html>
